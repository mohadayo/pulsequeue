services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      - API_PORT=8080
      - WORKER_URL=http://worker-engine:8081
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      worker-engine:
        condition: service_healthy

  worker-engine:
    build: ./worker-engine
    ports:
      - "8081:8081"
    environment:
      - WORKER_PORT=8081
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  dashboard:
    build: ./dashboard
    ports:
      - "8082:8082"
    environment:
      - DASHBOARD_PORT=8082
      - API_GATEWAY_URL=http://api-gateway:8080
      - WORKER_URL=http://worker-engine:8081
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      api-gateway:
        condition: service_healthy
